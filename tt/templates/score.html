<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="TT Scoreboard">
<meta name="theme-color" content="#0a0f1a">
<link rel="manifest" href="/manifest.json">
<title>Table Tennis Scoreboard</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="wrap">
    <div id="matchbar"><span id="matchscore"></span></div>

    <div class="grid" aria-live="polite">
        <div class="names">
            <div style="text-align:center">
                <div class="name">
                    <span id="nameA">{{ cfg.player_a_name }}</span>
                    (<span id="setsA">0</span>)
                </div>
            </div>
            <div style="text-align:center">
                <div class="name">
                    <span id="nameB">{{ cfg.player_b_name }}</span>
                    (<span id="setsB">0</span>)
                </div>
            </div>
        </div>

        <div class="score" role="group">
            <div id="scoreA" class="big">0</div>
            <div id="scoreB" class="big">0</div>
        </div>
    </div>

    <div class="controls">
        Keyboard: A/L = score · G = next game · N = new match · S = toggle serve · E = Quick Edit · C = Match mode · Esc = Admin
    </div>
</div>

<!-- Serve dots -->
<div id="arrowA" class="serve-dot"></div>
<div id="arrowB" class="serve-dot"></div>

<!-- Win banner -->
<div id="banner" class="banner" role="status">
    <div class="inner">
        <h2 id="bannerText"></h2>
        <div class="history" id="bannerHistory"></div>
    </div>
</div>

<!-- Floating buttons -->


<!-- Quick Edit modal -->
<style>
.modal label { font-size: 72px; font-weight: 600; }
.modal input, .modal select { font-size: 72px; padding: 20px; }
.modal h2 { font-size: 72px; }
.modal button { font-size: 48px; padding: 16px 40px; }
dialog { max-width: 100vw !important; width: 100vw !important; min-width: 100vw !important; margin: 0 !important; border-radius: 0 !important; padding: 0 !important; left: 0 !important; }
.row { grid-template-columns: 1fr; }
.modal button:focus, .modal button:hover { outline: 6px solid #f0c040; box-shadow: 0 0 60px rgba(240,192,64,1), 0 0 120px rgba(240,192,64,0.8); transform: scale(1.05); }
.modal button { transition: all 0.15s; }
</style>
<dialog id="dlgQuick" autocomplete="off">
    <div class="modal">
        <h2>Quick Edit</h2>
        <form id="quickForm" method="dialog" autocomplete="off">
            <div class="row">
                <label>Player A Name
                    <input name="player_a_name" id="qa" value="{{ cfg.player_a_name }}">
                </label>
                <label>Player B Name
                    <input name="player_b_name" id="qb" value="{{ cfg.player_b_name }}">
                </label>
            </div>
            <div class="row">
                <label>Sets to Win (0 = free play)
                    <input type="number" name="sets_to_win" id="qs" value="{{ cfg.sets_to_win }}" min="0">
                </label>
                <label>Who serves now
                    <select name="server_now" id="qserv">
                        <option value="A">A ({{ cfg.player_a_name }})</option>
                        <option value="B">B ({{ cfg.player_b_name }})</option>
                    </select>
                </label>
            </div>
            <div class="actions">
                <button type="button" id="qCancel">Cancel</button>
                <button type="submit" id="qSave">Save</button>
            </div>
        </form>
    </div>
</dialog>

<script>
    window.DOUBLE_CLICK_MS = {{ cfg.double_click_ms | int }};
    window.LONG_PRESS_MS   = {{ cfg.long_press_ms | int }};
</script>
<script src="/static/score.js"></script>
<div class="fab-tablet">
    <button onclick="window.location.href='/match/setup'" style="background:#121826;border:2px solid #9ad7ff;color:#9ad7ff;border-radius:10px;padding:12px 24px;font-size:32px;cursor:pointer;">⚙ Match</button>
    <button onclick="document.getElementById('dlgQuick').showModal()" style="background:#121826;border:2px solid #f0c040;color:#f0c040;border-radius:10px;padding:12px 24px;font-size:32px;cursor:pointer;">✎ Edit</button>
</div>
<div id="speechIcon" style="position:fixed;bottom:16px;right:16px;font-size:28px;font-weight:700;opacity:0.8;cursor:pointer;z-index:999;background:#121826;border:2px solid #f0c040;border-radius:10px;padding:8px 16px;color:#f0c040" onclick="fetch('/toggle_speech',{method:'POST'}).then(r=>r.json()).then(d=>{this.textContent=d.speech?'SND ON':'SND OFF'})">SND ON</div>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
}
</script>
</body>
</html>
