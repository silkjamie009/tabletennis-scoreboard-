<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Doubles Selection</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="match-wrap">
    <h1 class="match-title">🏓 Doubles Selection</h1>
    <div style="text-align:center;font-size:24px;margin-bottom:20px;color:#9ad7ff">
        {{ ms.home_team }} {{ ms.home_score }} — {{ ms.away_score }} {{ ms.away_team }}
    </div>

    <form method="post" action="/match/doubles">
        <div class="match-grid">
            <div class="match-col">
                <h2 class="match-subtitle">🏠 {{ ms.home_team }}</h2>
                <label class="match-label">Player 1
                    <select class="match-select" name="home_d1">
                        {% for p in ms.home_players %}<option value="{{ p }}">{{ p }}</option>{% endfor %}
                    </select>
                </label>
                <label class="match-label">Player 2
                    <select class="match-select" name="home_d2">
                        {% for p in ms.home_players %}<option value="{{ p }}">{{ p }}</option>{% endfor %}
                    </select>
                </label>
            </div>
            <div class="match-col">
                <h2 class="match-subtitle">✈️ {{ ms.away_team }}</h2>
                <label class="match-label">Player 1
                    <select class="match-select" name="away_d1">
                        {% for p in ms.away_players %}<option value="{{ p }}">{{ p }}</option>{% endfor %}
                    </select>
                </label>
                <label class="match-label">Player 2
                    <select class="match-select" name="away_d2">
                        {% for p in ms.away_players %}<option value="{{ p }}">{{ p }}</option>{% endfor %}
                    </select>
                </label>
            </div>
        </div>
        <button type="submit" class="match-btn">Confirm Doubles ▶</button>
    </form>
</div>
</body>
</html>
